name: Publish to PyPI

# Publish on every tag matching v*.*.* (e.g. v0.1.1, v1.0.0).
# The version inside pyproject.toml MUST match the tag — the workflow
# verifies this and refuses to publish on mismatch.
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  build:
    name: Build distributions
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/^version = "\(.*\)"/\1/')
          if [ "$TAG" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag $TAG does not match pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi
          echo "Tag matches pyproject version: $TAG"
      - name: Install build tooling
        run: pip install build
      - name: Build wheel + sdist
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # GitHub Environments let us protect the publish step with manual
    # approval, branch restrictions, and audit logging. Required when
    # using Trusted Publishers — PyPI checks both the repo AND the
    # environment name.
    environment:
      name: pypi
      url: https://pypi.org/project/somanylemons/
    permissions:
      # OIDC token for Trusted Publishers — no PyPI token in secrets.
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
